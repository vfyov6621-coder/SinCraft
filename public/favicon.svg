<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Dark rounded background -->
    <clipPath id="bgClip">
      <rect x="2" y="2" width="60" height="60" rx="14"/>
    </clipPath>

    <!-- Gradient for background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>

    <!-- Glow -->
    <radialGradient id="cubeGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>

    <!-- Top face highlight -->
    <linearGradient id="topHL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.1"/>
    </linearGradient>

    <clipPath id="cubeClip">
      <polygon points="32,14 50,24 32,34 14,24 14,44 32,54 50,44"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bgGrad)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="#10b981" stroke-width="1" opacity="0.2"/>

  <!-- Cube group, centered -->
  <g transform="translate(32, 34)">

    <!-- Glow -->
    <ellipse cx="0" cy="2" rx="24" ry="22" fill="url(#cubeGlow)"/>

    <!-- Top face -->
    <polygon points="0,-20 18,-10 0,0 -18,-10" fill="#10b981"/>
    <polygon points="0,-20 18,-10 0,0 -18,-10" fill="url(#topHL)"/>

    <!-- Left face -->
    <polygon points="-18,-10 0,0 0,20 -18,10" fill="#059669"/>

    <!-- Right face -->
    <polygon points="0,0 18,-10 18,10 0,20" fill="#047857"/>

    <!-- Pixel grid -->
    <g clip-path="url(#cubeClip)" transform="translate(-32, -34)">

      <!-- Top face grid -->
      <g stroke="#0d9668" stroke-width="0.5" opacity="0.5" stroke-linecap="round">
        <line x1="23" y1="16.3" x2="41" y2="26.3"/>
        <line x1="14" y1="21.7" x2="32" y2="31.7"/>
        <line x1="14" y1="26.3" x2="32" y2="16.3"/>
        <line x1="23" y1="31.7" x2="41" y2="21.7"/>
      </g>

      <!-- Left face grid -->
      <g stroke="#047a56" stroke-width="0.5" opacity="0.45" stroke-linecap="round">
        <line x1="23" y1="26.3" x2="23" y2="46.3"/>
        <line x1="32" y1="31.7" x2="32" y2="51.7"/>
        <line x1="14" y1="31.7" x2="32" y2="41.7"/>
        <line x1="14" y1="41.7" x2="32" y2="51.7"/>
      </g>

      <!-- Right face grid -->
      <g stroke="#036b4c" stroke-width="0.5" opacity="0.45" stroke-linecap="round">
        <line x1="41" y1="26.3" x2="41" y2="46.3"/>
        <line x1="50" y1="21.7" x2="50" y2="41.7"/>
        <line x1="32" y1="41.7" x2="50" y2="31.7"/>
        <line x1="32" y1="51.7" x2="50" y2="41.7"/>
      </g>
    </g>

    <!-- Edge highlights -->
    <g stroke="#34d399" stroke-width="0.7" opacity="0.35" stroke-linecap="round" fill="none">
      <line x1="-18" y1="-10" x2="0" y2="-20"/>
      <line x1="0" y1="-20" x2="18" y2="-10"/>
    </g>
    <g stroke="#022c22" stroke-width="0.7" opacity="0.25" fill="none">
      <line x1="-18" y1="10" x2="0" y2="20"/>
      <line x1="0" y1="20" x2="18" y2="10"/>
    </g>

    <!-- Specular -->
    <circle cx="-4" cy="-13" r="1.2" fill="#6ee7b7" opacity="0.3"/>

  </g>
</svg>